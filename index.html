<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Online booking through Telegram and CRM management for service businesses in Uzbekistan."
    />
    <meta name="theme-color" content="#F4F6FA" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          document.documentElement.setAttribute(
            'data-theme',
            localStorage.getItem('easyq_theme') || 'light',
          );
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
